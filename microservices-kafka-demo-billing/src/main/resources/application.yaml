server:
  port: 8082

spring:
  application:
    name: microservices-kafka-demo

  datasource:
    url: jdbc:mysql://localhost:3307/ms-kafka-billing?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: user
    password: User123456!
    driver-class-name: com.mysql.cj.jdbc.Driver


  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring:
          json:
            add:
              type:
                headers: false


logging:
  level:
    root: INFO


management:
  endpoints:
    web:
      exposure:
        include: health,info